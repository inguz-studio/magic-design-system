# =============================================================================
# StackedBarKpiCard.spec.yaml — KPI conectividade com barra stacked + legenda
# =============================================================================
# Especialização do KpiCardShell pra representação de conectividade com:
#   - intro text opcional
#   - barra horizontal stacked (segmentos com flex proporcional)
#   - linha de summary (ex: "Geral: Regular 60%")
#   - legenda vertical com swatch + label + valor por segmento
# =============================================================================

component: StackedBarKpiCard
version: 0.1.0
kind: domain
domain:
  tenant_origin: shelflix
  business_concept: "KPI distribuicao como barra empilhada horizontal com legenda"
  use_cases:
    - "Distribuicao percentual de status por periodo"
status: draft
category: display
atomic_level: organism

products: [shelflix-admin]
tenants: [shelflix]

# ── VENDOR ───────────────────────────────────────────────────────────────────
vendor:
  primitive: null
# ── CONTRATO DE VARIANTES ────────────────────────────────────────────────────
variants: {}
sizes: []
states: [default]

# ── BEM CLASSES ──────────────────────────────────────────────────────────────
bem:
  block: stacked-bar-kpi
  elements:
    - intro           # texto intro opcional (ex: "Divisão de conectividade")
    - bar             # container da barra stacked
    - bar-segment     # segmento individual da barra (inline style pra cor/flex)
    - summary         # linha "Geral: X Y%"
    - summary-label   # texto "Geral: Regular"
    - summary-value   # percentual "60%"
    - legend          # lista vertical de itens
    - legend-item     # item (swatch + label + value)
    - legend-swatch   # bolinha colorida
    - legend-label    # texto do status
    - legend-value    # valor/percentual
  modifiers: {}

# ── HTML SEMÂNTICO CANÔNICO ──────────────────────────────────────────────────
html_structure: |
  <article class="kpi-card">
    <header class="kpi-card__header">
      <span class="kpi-card__icon" aria-hidden="true"><!-- {icon} --></span>
      <h4 class="kpi-card__title">{title}</h4>
    </header>
    <div class="kpi-card__body">
      <p class="stacked-bar-kpi__intro">{intro}</p>
      <div class="stacked-bar-kpi__bar" role="img" aria-label="{summary.label}">
        <!-- por segmento (cor e flex via inline style): -->
        <div class="stacked-bar-kpi__bar-segment"
             style="flex: {percent}; background: var(--semantic-status-{status}); opacity: {opacity}">
        </div>
      </div>
      <div class="stacked-bar-kpi__summary">
        <span class="stacked-bar-kpi__summary-label">{summary.label}</span>
        <span class="stacked-bar-kpi__summary-value">{summary.value}</span>
      </div>
      <div class="stacked-bar-kpi__legend">
        <!-- por segmento: -->
        <div class="stacked-bar-kpi__legend-item">
          <span class="stacked-bar-kpi__legend-swatch"
                style="background: var(--semantic-status-{status}); opacity: {opacity}"></span>
          <span class="stacked-bar-kpi__legend-label">{label}</span>
          <span class="stacked-bar-kpi__legend-value">{count} mat. · {percent}%</span>
        </div>
      </div>
    </div>
  </article>

# ── MAPPING DE TOKENS ────────────────────────────────────────────────────────
tokens:
  shared:
    bar-height: "14px"
    bar-bg: --semantic-bg-subtle
    bar-radius: --semantic-radius-control
    intro-size: --primitive-text-xs
    intro-color: --semantic-text-tertiary
    summary-label-size: --primitive-text-sm
    summary-label-weight: --primitive-weight-semibold
    summary-label-color: --semantic-text-primary
    summary-value-size: --primitive-text-sm
    summary-value-color: --semantic-text-secondary
    legend-row-gap: --semantic-space-stack-xs
    legend-swatch-size: "10px"
    legend-label-size: --primitive-text-xs
    legend-label-color: --semantic-text-secondary
    legend-value-size: --primitive-text-xs
    legend-value-color: --semantic-text-tertiary
    # segment colors: inline via style (runtime)

# ── RITMO VERTICAL ───────────────────────────────────────────────────────────
rhythm:
  internal_item_gap: stack-sm
  container_padding: inset-lg
  heading_association_respected: true
  first_last_reset_required: false
  composition_gap: null
  exceptions:
    - "Cores dos segmentos são inline (runtime)"

# ── ACESSIBILIDADE (WCAG 2.1 AA) ─────────────────────────────────────────────
a11y:
  role: implicit
  semantic_element: article
  keyboard: []
  focus_visible: not_applicable
  required_aria:
    - "stacked-bar-kpi__bar[role='img'][aria-label] — resume dados da barra"
  wcag_criteria:
    - "1.4.3"
    - "1.4.11"

# ── API PÚBLICA ──────────────────────────────────────────────────────────────
api:
  props:
    title:
      type: string
      required: true
    icon:
      type: ReactNode
      required: false
    helpText:
      type: string
      required: false
    intro:
      type: string
      required: false
      description: "Texto introdutório acima da barra."
    segments:
      type: "{ label: string; count: number; percent: number; color: string; opacity?: number }[]"
      required: true
      description: "Segmentos da barra. color = CSS var name. percent = 0-100."
    summary:
      type: "{ label: string; value: string }"
      required: true
      description: "Linha de resumo ex: { label: 'Geral: Regular', value: '60%' }."
    className:
      type: string
      required: false
  events: []

# ── OUTPUTS ──────────────────────────────────────────────────────────────────
outputs:
  canonical:
    - html
    - css
  adapter_react:
    enabled: true
    artifacts:
      - tsx
      - types
      - contract

# ── COMPOSITION ──────────────────────────────────────────────────────────────
composes: [KpiCardShell]

# ── GAPS PARA FOUNDATIONS ────────────────────────────────────────────────────
gaps_for_foundations:
  - "--semantic-space-stack-xs: confirmar existência em tokens.css"
  - "--semantic-radius-control: confirmar existência em tokens.css"

# ── RASTREABILIDADE ──────────────────────────────────────────────────────────
references:
  output:
    canonical_css: squads/magic-ds/output/css/stacked-bar-kpi.css
    canonical_html: squads/magic-ds/output/html/stacked-bar-kpi.html
    adapter_react: src/components/organisms/StackedBarKpiCard/

# ── METADADOS ────────────────────────────────────────────────────────────────
meta:
  owner: mds-component
  created: 2026-05-14
  last_modified: 2026-05-14
  round: 2
  wave: 3
  template_version: 2.0.0
  migration_notes:
    - "2026-05-14: criado pra Dashboard (Conectividade Geral). Especialização canônica do KpiCardShell com barra stacked."

# Round 3.1 type roles consumidos (--semantic-type-*):
tokens_type:
  - action (__summary)
  - micro (__legend)
