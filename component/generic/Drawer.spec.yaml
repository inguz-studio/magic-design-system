# =============================================================================
# Drawer.spec.yaml — Contrato canônico Round 4
# Spec criado retroativamente — CSS+adapter existiam desde Round 3.3 sem spec
# formal no template v2. Upgradeado em 2026-05-19.
# =============================================================================

component: Drawer
version: 0.1.0
kind: generic
status: draft
category: navigation
atomic_level: organism

products: [shelflix-admin]
tenants: [shelflix]

# ── VENDOR ───────────────────────────────────────────────────────────────────
# Drawer na vendor_whitelist (squad-policy.yaml). Reusa primitivo Dialog.
vendor:
  primitive: dialog
  install_path: src/vendor/dialog.tsx
  import_alias: "@/vendor/dialog"

# ── VARIANTES ────────────────────────────────────────────────────────────────
variants:
  side: [left, right]
  modal: [modal]

sizes: []

states:
  - closed
  - open

# ── BEM CLASSES ──────────────────────────────────────────────────────────────
bem:
  block: drawer
  elements:
    - overlay
    - header
    - title
    - close
    - body
    - footer
  modifiers:
    side: [left, right]
    state: [modal]

# ── HTML SEMÂNTICO CANÔNICO ──────────────────────────────────────────────────
html_structure: |
  <!-- modal=true: overlay + dialog modal -->
  <div class="drawer__overlay"></div>
  <aside class="drawer drawer--right drawer--modal"
         role="dialog"
         aria-modal="true"
         aria-labelledby="drawer-title">
    <header class="drawer__header">
      <h2 class="drawer__title" id="drawer-title">Filtros</h2>
      <button class="drawer__close" aria-label="Fechar">×</button>
    </header>
    <div class="drawer__body"><!-- children --></div>
    <footer class="drawer__footer"><!-- footer --></footer>
  </aside>

  <!-- modal=false: sem overlay, sem aria-modal -->
  <aside class="drawer drawer--right"
         role="complementary"
         aria-label="Filtros">
    <header class="drawer__header">
      <h2 class="drawer__title">Filtros</h2>
      <button class="drawer__close" aria-label="Fechar">×</button>
    </header>
    <div class="drawer__body"><!-- children --></div>
  </aside>

# ── A11Y NATIVA ──────────────────────────────────────────────────────────────
a11y_native:
  pattern: dialog-aria-1.2
  required:
    - "modal=true: role='dialog' + aria-modal='true'"
    - "modal=false: role='complementary' ou role='navigation'; SEM aria-modal"
    - "aria-labelledby apontando pro title quando há título"
    - "Focus trap ativo quando modal=true; não-modal permite foco fora"
    - "Escape fecha em ambos os modos"
    - "Click no overlay fecha apenas quando modal=true"
    - "Return focus ao trigger após fechar"

# ── TOKENS ───────────────────────────────────────────────────────────────────
tokens:
  shared:
    bg: --sf-bg-surface
    text: --sf-text-primary
    border: --sf-border
    z-index: --sf-z-drawer
    space-inline: --sf-space-inline-md
    space-inset: --sf-space-inset-md
    type-heading: --sf-type-heading-sm
    radius-control: --sf-radius-control-sm
    size-control: --sf-size-control-sm
    text-tertiary: --sf-text-tertiary
    focus-ring: --sf-shadow-focus-ring
  modal:
    default:
      shadow: --sf-shadow-overlay
      overlay-bg: --sf-bg-overlay

# ── DRIFT DETECTION ──────────────────────────────────────────────────────────
tokens_type:
  - heading-sm

tokens_shadow:
  - focus-ring
  - overlay

tokens_motion: []

tokens_z:
  - drawer

tokens_container: []

tokens_icon:
  - control

# ── RITMO VERTICAL ───────────────────────────────────────────────────────────
rhythm:
  internal_item_gap: stack-md
  internal_group_gap: stack-md
  container_padding: inset-md
  heading_association_respected: true
  first_last_reset_required: false
  composition_gap: null
  exceptions:
    - "Footer usa justify-content: flex-end com gap inline-sm entre botões"

# ── ACESSIBILIDADE ───────────────────────────────────────────────────────────
a11y:
  role: dialog
  semantic_element: aside
  keyboard:
    - Tab
    - Escape
  focus_visible: required
  required_aria:
    - role=dialog (modal) ou role=complementary (inline)
    - aria-modal=true (somente modal=true)
    - aria-labelledby apontando pro title
    - aria-label=Fechar no botão close
  wcag_criteria:
    - "1.4.3"
    - "2.1.1"
    - "2.1.2"
    - "2.4.3"
    - "2.4.7"
    - "2.5.5"

# ── API PÚBLICA ──────────────────────────────────────────────────────────────
api:
  props:
    trigger:
      type: ReactNode
      required: false
      description: "Elemento que abre o Drawer (passado como asChild ao VendorDialogTrigger)."
    side:
      type: enum
      values: [left, right]
      default: right
      required: false
      description: "Lado de ancoragem."
    title:
      type: ReactNode
      required: false
      description: "Título renderizado no header; omitir esconde o header inteiro."
    isOpen:
      type: boolean
      required: false
      description: "Controlled open state."
    onOpenChange:
      type: function
      required: false
      description: "(open: boolean) => void"
    modal:
      type: boolean
      default: true
      required: false
      description: "true = overlay + focus trap; false = inline sem overlay."
    footer:
      type: ReactNode
      required: false
      description: "Conteúdo do footer (botões de ação)."
    children:
      type: ReactNode
      required: true
      description: "Conteúdo principal do body."
    className:
      type: string
      required: false
      description: "Classe adicional injetada no elemento raiz."
  events: []

# ── OUTPUTS ──────────────────────────────────────────────────────────────────
outputs:
  canonical:
    - html
    - css
  tailwind:
    auto: true
  adapter_react:
    enabled: true
    artifacts:
      - tsx
      - types
      - contract
  documentation:
    - stories

# ── THEME OVERRIDES ──────────────────────────────────────────────────────────
theme_overrides:
  shelflix-admin: []

# ── GAPS PARA FOUNDATIONS ────────────────────────────────────────────────────
gaps_for_foundations: []

# ── RASTREABILIDADE ──────────────────────────────────────────────────────────
references:
  figma:
    file: zYrfb4icuUdsXJHKBmZiAY
    node: TBD
  foundations: squads/magic-ds/foundations/07-token-architecture-v3.md
  governance: squads/magic-ds/governance/matrix.md
  component_kinds: squads/magic-ds/governance/component-kinds.md
  canonical_css: squads/magic-ds/output/css/drawer.css
  adapter: src/components/organisms/Drawer/Drawer.tsx
  squad_spec: squads/magic-ds/component/generic/Drawer.spec.yaml

# ── METADADOS ────────────────────────────────────────────────────────────────
meta:
  owner: mds-component
  created: 2026-05-15
  last_modified: 2026-05-19
  round: 4
  wave: post-cleanup
  notes: |
